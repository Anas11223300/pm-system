/* ===== VARIABLES ===== */
:root {
  --sidebar-w: 240px;
  --header-h: 64px;
  --bg: #F0F4F8;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --primary: #1E3A6E;
  --primary-light: #2563EB;
  --accent: #0EA5E9;
  --green: #16A34A;
  --green-bg: #DCFCE7;
  --yellow: #D97706;
  --yellow-bg: #FEF3C7;
  --red: #DC2626;
  --red-bg: #FEE2E2;
  --purple: #7C3AED;
  --purple-bg: #EDE9FE;
  --text: #0F172A;
  --muted: #64748B;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
}

/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
a{text-decoration:none;color:inherit}

/* ===== LOGIN ===== */
#loginScreen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:linear-gradient(135deg,#0a1f5c 0%,#1a3a7c 50%,#0e2d6b 100%);
}
.login-box{
  background:#fff;border-radius:16px;padding:48px 40px;
  width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.login-logo{display:flex;justify-content:center;margin-bottom:32px}
.login-title{font-size:20px;font-weight:700;color:var(--primary);text-align:center;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}

/* ===== APP LAYOUT ===== */
#app{display:none;height:100vh;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);height:100vh;position:fixed;left:0;top:0;
  background:#0F172A;color:#CBD5E1;display:flex;flex-direction:column;z-index:100;
}
.sidebar-logo{
  padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:12px;
}
.sidebar-logo-text{font-size:13px;font-weight:600;color:#F1F5F9;line-height:1.3}
.sidebar-logo-sub{font-size:10px;color:#64748B}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  margin:2px 8px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;
  color:#94A3B8;transition:all .15s;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#E2E8F0}
.nav-item.active{background:#2563EB;color:#fff}
.nav-item .nav-icon{font-size:160x;width:20px;text-align:center}
.sidebar-user{
  padding:16px;border-top:1px solid rgba(255,255,255,.08);
  font-size:12px;color:#64748B;
}
.sidebar-user strong{display:block;color:#CBD5E1;font-size:13px;margin-bottom:2px}

/* ===== MAIN ===== */
.main{margin-left:var(--sidebar-w);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ===== HEARER ===== */
.header{
  height:var(--header-h);background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;z-index:50;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.header-title{font-size:20px;font-weight:700;color:var(--primary)}
.header-right{display:flex;align-items:center;gap:16px}
.header-date{font-size:12px;color:var(--muted)}
.btn-logout{
  padding:7px 14px;background:transparent;border:1.5px solid var(--border);
  border-radius:7px;font-size:12px;font-weight:600;color:var(--muted);
  transition:all .2s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#94A3B8;display:inline-block;margin-right:4px}
.sync-dot.online{background:var(--green)}

/* ===== PAGE CONTENT ===== */
.page-content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}
.page.active{display:block}

/* ===== SECTION TITLE ===== */
.section-title{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}

/* ===== KPI GRID ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.blue::before{background:var(--primary-light)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.red::before{background:var(--red)}
.kpi-card.yellow::before{background:var(--yellow)}
.kpi-card.purple::before{background:var(--purple)}
.kpi-card.teal::before{background:#0EA5E9}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .3s}

/* ===== GRID LAYOUTS ===== */
.grid-8-4{display:grid;grid-template-columns:8fr 4fr;gap:16px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}

/* ===== REGION BARS ===== */
.region-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.region-row:hover{background:#F8FAFC;margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:6px}
.region-row:last-child{border-bottom:none}
.region-name{font-size:13px;font-weight:600;width:130px;flex-shrink:0}
.region-bar-wrap{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.region-bar-fill{height:100%;border-radius:5px;background:var(--primary-light);transition:width .4s}
.region-pct{font-size:12px;font-weight:700;color:var(--primary);width:42px;text-align:right;flex-shrink:0}
.region-count{font-size:11px;color:var(--muted);width:65px;flex-shrink:0}

/* ===== TABLE ===== */
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px;min-width:1100px}
.table-wrap thead{position:sticky;top:0;background:#F1F5F9;z-index:5}
.table-wrap th{
  padding:10px 12px;text-align:left;font-size:12px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.4px;
  border-bottom:2px solid var(--border);white-space:nowrap;
}
.table-wrap td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.table-wrap tr:hover td{background:#F8FAFC}
.table-wrap tr:last-child td{border-bottom:none}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:#F1F5F9;color:var(--muted)}

/* ===== STAGE COLORS ===== */
.stage-not-started{color:#94A3B8}
.stage-survey{color:#0EA5E9}
.stage-approval{color:#0EA5E9}
.stage-civil-mat{color:#D97706}
.stage-civil-done{color:#D97706}
.stage-elec-mat{color:#2563EB}
.stage-elec-done{color:#2563EB}
.stage-tnc{color:#7C3AED}
.stage-energized{color:#16A34A}

/* ===== FILTER BAR ===== */
.filter-bar{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.filter-select{
  padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;
  font-size:13px;background:#ffc;color:var(--text);outline:none;min-width:130px;
}
.filter-select:focus{border-color:var(-display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;
  font-size:13px;outline:none;
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--primary-light)}
.form-field{margin-bottom:14px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ===== TABS ===== */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:2px}
.tab{
  padding:10px 18px;font-size:13px;font-weight:600;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;
  transition:color .15s,border-color .15s;
}
.tab.active{color:var(--primary-light);border-bottom-color:var(--primary-light)}
.tab:hover:not(.active){color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ===== CHART PLACEHOLDER ===== */
.chart-area{height:240px;display:flex;align-items:center;justify-content:center;background:#F8FAFC;border-radius:8px;color:var(--muted);font-size:13px}

/* ===== DONUT ===== */
.donut-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 0}
.donut-legend{margin-top:12px;width:100%}
.donut-item{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px}
.donut-dot{width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0}

/* ===== FINANCIAL ===== */
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.fin-row:last-child{border-bottom:none}

/* ===== AUDIT ===== */
.audit-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.audit-time{color:var(--muted);font-size:11px;white-space:nowrap;padding-top:2px;min-width:120px}
.audit-msg{flex:1}

<!-- ========== SCHOOL MODAL ========== -->
<div class="modal-overlay" id="schoolModal">
  <div class="modal">
    <div class="modal-title">
      <button class="modal-close" onclick="closeModal('schoolModal')">✕</button>
      <span id="schoolModalTitle">School Details</span>
    </div>
    <div class="form-row">
      <div class="form-field"><label>School ID</label><input id="sch_id" placeholder="SCH-001"></div>
      <div class="form-field"><label>School Name</label><input id="sch_name" placeholder="Al-Noor Primary"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Region</label>
        <select id="sch_region">
          <option>Northern Borders</option><option>Tabuk</option>
          <option>Najran</option><option>Jizan</option><option>Al-Jouf</option>
        </select>
      </div>
      <div class="form-field"><label>Cluster</label><input id="sch_cluster" placeholder="Cluster A"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Stage</label>
        <select id="sch_stage">
          <option>Not Started</option><option>Site Survey</option>
          <option>Client Approval</option><option>Civil Materials</option>
          <option>Civil Install Done</option><option>Elec Materials</option>
          <option>Elec Install Done</option><option>T&amp;C</option><option>Energized</option>
        </select>
      </div>
      <div class="form-field"><label>Days in Stage</label><input id="sch_days" type="number" value="0"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Civil Kit</label>
        <select id="sch_civil"><option>Ready</option><option>Partial</option><option>Missing</option></select>
      </div>
      <div class="form-field"><label>Elec Kit</label>
        <select id="sch_elec"><option>Ready</option><option>Partial</option><option>Missing</option></select>
      </dis>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Blocked?</label>
        <select id="sch_blocked" onchange="toggleBlockReason()">
          <option value="no">No</option><option value="yes">Yes</option>
        </select>
      </div>
      <div class="form-field" id="blockReasonField'"><label>Block Reason</label>
        <select id="sch_reason">
          <option>Material Delay</option><option>Procurment</option>
          <option>Client Approval</option><option>Contractor</option>
          <option>Utility / SEC</option><option>RFI Pending</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Owner</label>
        <select id="sch_owner">
          <option>Procurement</option><option>Contractor</option>
          <option>Client</option><option>Utility / SEC</option><option>PM</option>
        </select>
      </div>
      <div class="form-field"><label>Forecast Date</label><input id="sch_forecast" type="date"></div>
    </div>
    <div class="form-field"><label>Remarks</label>
      <textarea id="sch_remarks" rows="3" placeholder="Notes or remarks…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal('schoolModal')">Cancel</button>
      <button class="btn-primary-sm" onclick="saveSchool()">Save School</button>
    </div>
  </div>
</div>

// ===================== SAMPLE SCHOOL DATA GENERATOR =====================
function generateSampleSchools(){  const schools = [];
  const clusterNames = ['Alpha','Bravo','Charlie','Delta'];
  REGIONS.forEach((region,ri)=>{
    for(let i=1;i<=200;i++){
      const id = region.substring(0,2).toUpperCase()+'-'+String(i).padStart(3,'0');
      const stageIdx = Math.floor(Math.random()*9);
      const stage = STAGES[stageIdx];
      const days = Math.floor(Math.random()*20);
      const blocked = stageIdx>0 && Math.random()<0.12;
      const civilKit = stageIdx>=3?'Ready':(Math.random()<0.6?'Ready':'Partial');
      const elecKit = stageIdx>=5?'Ready':(Math.random()<0.4?'Ready':'Missing');
      schools.push({
        id:id,
        name:'School '+id,
        region,
        cluster:'Cluster '+clusterNames[Math.floor(i/51)],
        stage,
        stageIdx,
        days,
        civilKit,
        elecKit,
        blocked,
        reason: blocked?BLOCK_REASONS[Math.floor(Math.random()*BLOCK_REASONS.length)]:'',
        owner: blocked?OWNERS[Math.floor(Math.random()*OWNERS.length)]:'',
        rfis: Math.floor(Math.random()*3),
        lastUpdate: new Date(Date.now()-Math.random()*10*86400000).toISOString().split('T')[0],
        forecast: new Date(Date.now()+Math.random()*90*86400000).toISOString().split('T')[0],
        remarks:'',
        poNumber: blocked&&Math.random()<0.4?'PO-'+Math.floor(Math.random()*9000+1000):''
      });
    }
  });
  return schools;
}

// ===================== AUTH =====================
let Auth = {user:null};

function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const users = DB.get('users') || DEFAULT_USERS;
  const found = users.find(x=>x.username===u && x.password===p);
  if(!found){
    document.getElementById('loginError').style.display='block';
    return;
  }
  Auth.user = found;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sidebarUserName').textContent = found.name;
  document.getElementById('sidebarUserRole').textContent = found.role==='gpm'?'Global PM':'Regional PM · '+found.region;
  document.getElementById('settingsUser').textContent = found.name;
  document.getElementById('settingsRole').textContent = found.role==='gpm'?'Global Project Manager':'Regional PM';
  // Hide add project for regional PMs
  if(found.role!=='gpm') document.getElementById('addProjectBtn').style.display='none';
  initApp();
  auditLog('Login: '+found.name);
}

function doLogout(){
  Auth.user=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
}

// ===================== FIREBASE =====================
let _fbDb=null, _lastSync=0;
function initFB(){
  try{
    if(!window.firebase) return;
    const app = firebase.apps.length?firebase.apps[0]:firebase.initializeApp(getFbCfg());
    _fbDb = firebase.database(app);
    document.getElementById('syncDot').className='sync-dot online';
    document.getElementById('settingsFb').textContent='Connected';
    _fbDb.ref('pms').on('value', snap=>{
      const d=snap.val();
      if(!d) return;
      const t=Date.now();
      if(t-_lastSync<2000) return;
      _lastSync=t;
      Object.keys(d).forEach(k=>{
        try{localStorage.setItem('pms_'+k,JSON.stringify(d[k]))}catch{}
      });
    });
  }catch(e){console.warn('FB init failed',e)}
}
function fbSet(k,v){try{if(_fbDb)_fbDb.ref('pms/'+k).set(v)}catch{}}
function fbDel(k){try{if(_fbDb)_fbDb.ref('pms/'+k).remove()}catch{}}

// ===================== AUDIT =====================
function auditLog(msg){
  const log = DB.get('audit')||[];
  log.unshift({t:new Date().toISOString(),msg,user:Auth.user?Auth.user.name:'System'});
  if(log.length>200) log.pop();
  DB.set('audit',log);
}

// ===================== NAVIGATION =====================
function showPage(pageId, navEl){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  if(navEl) navEl.classList.add('active');
  const titles={dashboard:'Dashboard',programControl:'Program Control',supplyChain:'Supply Chain',
    projects:'Projects',financial:'Financial',auditLog:'Audit Log',settings:'Settings'};
  document.getElementById('headerTitle').textContent = titles[pageID]||pageId;
  // Render page content
  if(pageId==='dashboard') renderDashboard();
  if(pageId==='programControl') renderProgramControl();
  if(pageId==='supplyChain') renderSupplyChain();
  if(pageId==='projects') renderProjects();
  if(pageId==='financial') renderFinancial();
  if(pageId==='auditLog') renderAuditLog();
}

// ===================== INIT =====================
function initApp(){
  DB.init();
  initFB();
  updateHeaderDate();
  setInterval(updateHeaderDate,60000);
  renderDashboard();
}

function updateHeaderDate(){
  const d=new Date();
  document.getElementById('headerDate').textContent=d.toLocaleDateString('en-SA',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
  document.getElementById('dashDate').textContent='Last updated: '+d.toLocaleTimeString('en-SA',{hour:'2-digit',minute:'2-digit'});
}
